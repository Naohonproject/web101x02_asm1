<!-- @format -->

<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<link rel="stylesheet" href="./assets/css/style.css" />
		<link rel="stylesheet" href="./assets/css/responsive.css" />

		<title>Signup</title>
	</head>
	<body>
		<form class="form" id="form-signup" action="" method="">
			<div id="wrapper">
				<div class="logo">
					<h1>Signup</h1>
				</div>
				<div class="user-input">
					<label for="user-id"><strong>User</strong></label>
					<input
						type="text"
						id="user-id"
						required
						placeholder="Email or Phone Number"
					/>
				</div>

				<div class="user-input">
					<label for="user-pass"><strong>Password</strong></label>
					<input type="text" id="user-pass" required placeholder="Password" />
				</div>
				<div class="user-input">
					<label for="user-pass"><strong>Confirm Password</strong></label>
					<input
						type="text"
						id="user-pass"
						required
						placeholder="Confirm Password"
					/>
					/>
				</div>

				<div class="btn">
					<button type="button">Sign Up</button>
				</div>
			</div>
		</form>
	</body>
</html>
